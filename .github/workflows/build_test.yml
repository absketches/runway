name: build-test

on:
    pull_request:
    push:

permissions:
    contents: read

concurrency:
    group: "build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
    cancel-in-progress: true

jobs:
    verify:
        name: Maven Verify
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v7

            -   name: Set up Java
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: "21"
                    cache: maven

            -   name: Verify reactor
                run: mvn -B -Pcoverage verify

            -   name: Publish coverage summary
                shell: bash
                run: |
                    report="runway-integration-tests/target/site/jacoco-aggregate/jacoco.xml"
                    if [[ ! -f "$report" ]]; then
                      echo "JaCoCo aggregate report not found: $report"
                      exit 1
                    fi

                    line_counter="$(grep -o '<counter type="LINE"[^>]*/>' "$report" | tail -n 1)"
                    if [[ -z "$line_counter" ]]; then
                      echo "No LINE counter found in JaCoCo aggregate report: $report"
                      exit 1
                    fi

                    missed="$(sed -n 's/.*missed="\([0-9][0-9]*\)".*/\1/p' <<< "$line_counter")"
                    covered="$(sed -n 's/.*covered="\([0-9][0-9]*\)".*/\1/p' <<< "$line_counter")"
                    total=$((missed + covered))

                    if [[ "$total" -eq 0 ]]; then
                      percentage="100.00"
                    else
                      percentage="$(awk -v covered="$covered" -v total="$total" 'BEGIN { printf "%.2f", covered / total * 100 }')"
                    fi

                    summary="Total line coverage: ${percentage}% (${covered}/${total} lines)"
                    echo "$summary"
                    {
                      echo "## JaCoCo coverage"
                      echo
                      echo "$summary"
                    } >> "$GITHUB_STEP_SUMMARY"

            -   name: Upload coverage report
                uses: actions/upload-artifact@v7
                with:
                    name: jacoco-aggregate-report
                    path: runway-integration-tests/target/site/jacoco-aggregate/
                    if-no-files-found: error
