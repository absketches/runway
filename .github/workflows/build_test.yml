name: build-test

on:
    pull_request:
    push:

permissions:
    contents: read

concurrency:
    group: "build-${{ github.event.repository.name }}"

jobs:
    verify:
        name: Maven Verify
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up Java
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: "21"
                    cache: maven

            -   name: Verify reactor
                run: mvn -B verify

            -   name: Publish coverage summary
                shell: bash
                run: |
                    set -euo pipefail
                    
                    publish_coverage() {
                      module_name="$1"
                      report="$2"
                    
                      if [[ ! -f "$report" ]]; then
                        echo "JaCoCo report not found for ${module_name}: ${report}"
                        exit 1
                      fi
                    
                      echo "Reading JaCoCo report for ${module_name}: ${report}"
                    
                      # The final LINE counter in a JaCoCo XML report represents
                      # the total line coverage for the module.
                      line_counter=$(
                        awk '
                          {
                            content = $0
                    
                            while (
                              match(
                                content,
                                /<counter[^>]*type="LINE"[^>]*\/>/
                              )
                            ) {
                              last_counter = substr(
                                content,
                                RSTART,
                                RLENGTH
                              )
                    
                              content = substr(
                                content,
                                RSTART + RLENGTH
                              )
                            }
                          }
                    
                          END {
                            if (last_counter) {
                              print last_counter
                            }
                          }
                        ' "$report"
                      )
                    
                      if [[ -z "$line_counter" ]]; then
                        echo "No LINE counter found in ${report}"
                        exit 1
                      fi
                    
                      covered=$(
                        printf '%s\n' "$line_counter" |
                          sed -n 's/.*covered="\([0-9][0-9]*\)".*/\1/p'
                      )
                    
                      missed=$(
                        printf '%s\n' "$line_counter" |
                          sed -n 's/.*missed="\([0-9][0-9]*\)".*/\1/p'
                      )
                    
                      if [[ -z "$covered" || -z "$missed" ]]; then
                        echo "Could not extract coverage values from ${report}"
                        echo "LINE counter: ${line_counter}"
                        exit 1
                      fi
                    
                      total=$((covered + missed))
                    
                      if [[ "$total" -eq 0 ]]; then
                        percentage="100.00"
                      else
                        percentage=$(
                          awk \
                            -v covered="$covered" \
                            -v total="$total" \
                            'BEGIN {
                              printf "%.2f", (covered / total) * 100
                            }'
                        )
                      fi
                    
                      summary="${module_name}: ${percentage}% (${covered}/${total} lines)"
                    
                      echo "$summary"
                    
                      {
                        echo "### ${module_name}"
                        echo
                        echo "${percentage}% line coverage (${covered}/${total} lines)"
                        echo
                      } >> "$GITHUB_STEP_SUMMARY"
                    }
                    
                    {
                      echo "## JaCoCo coverage"
                      echo
                    } >> "$GITHUB_STEP_SUMMARY"
                    
                    publish_coverage \
                      "runway-codegen" \
                      "runway-codegen/target/site/jacoco/jacoco.xml"
                    
                    publish_coverage \
                      "runway-core" \
                      "runway-core/target/site/jacoco/jacoco.xml"

            -   name: Upload runway-codegen coverage report
                uses: actions/upload-artifact@v7
                with:
                    name: runway-codegen-jacoco-report
                    path: runway-codegen/target/site/jacoco/
                    if-no-files-found: error

            -   name: Upload runway-core coverage report
                uses: actions/upload-artifact@v7
                with:
                    name: runway-core-jacoco-report
                    path: runway-core/target/site/jacoco/
                    if-no-files-found: error
