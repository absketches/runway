name: "Release Runway Codegen"

on:
  workflow_dispatch:
    inputs:
      publish_github_packages:
        description: Publish runway-codegen to GitHub Packages.
        required: true
        default: true
        type: boolean
      publish_sonatype:
        description: Publish runway-codegen to Sonatype Central.
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_sha: ${{ steps.commit.outputs.release_sha }}
    steps:
      - name: Require main branch
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Releases can only run from main. Current ref is ${GITHUB_REF_NAME}."
            exit 1
          fi

          if [[ "${{ inputs.publish_github_packages }}" != "true" && "${{ inputs.publish_sonatype }}" != "true" ]]; then
            echo "At least one publish target must be selected."
            exit 1
          fi

      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Require successful build-test for verified source commit
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          verified_sha="$GITHUB_SHA"
          while git log -1 --format=%B "$verified_sha" | grep -Eq '(^Release runway-|\[skip ci\])'; do
            parent="$(git rev-parse "${verified_sha}^" 2>/dev/null || true)"
            if [[ -z "$parent" ]]; then
              echo "Could not find a non-release commit before ${GITHUB_SHA}."
              exit 1
            fi
            verified_sha="$parent"
          done

          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build_test.yml \
            --branch main \
            --commit "$verified_sha" \
            --limit 100 \
            --json databaseId,status,conclusion \
            --jq '.[] | select(.status == "completed" and .conclusion == "success") | .databaseId' \
            | head -n 1)"

          if [[ -z "$run_id" ]]; then
            echo "No successful build-test workflow run found for ${verified_sha} on main."
            echo "Push the source commit to main and let build-test pass before releasing."
            exit 1
          fi

          if [[ "$verified_sha" != "$GITHUB_SHA" ]]; then
            echo "Current commit ${GITHUB_SHA} is a release or skip-ci commit."
          fi
          echo "Using successful build-test run ${run_id} for verified source commit ${verified_sha}."

      - name: Create timestamp version
        id: version
        shell: bash
        run: |
          version="$(date -u +'%Y.%m.%d.%H%M%S')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Commit release version
        id: commit
        shell: bash
        run: |
          mvn -B -f runway-codegen/pom.xml versions:set \
            -DnewVersion=${{ steps.version.outputs.version }} \
            -DgenerateBackupPoms=false \
            -DprocessParent=false
          mvn -B -N versions:set-property \
            -Dproperty=runway-codegen.version \
            -DnewVersion=${{ steps.version.outputs.version }} \
            -DgenerateBackupPoms=false
          mvn -B -pl runway-integration-tests -am verify

          git switch -c main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml runway-codegen/pom.xml
          if git diff --cached --quiet; then
            echo "No release version changes were staged."
            exit 1
          fi
          git commit -m "Release runway-codegen ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

          release_sha="$(git rev-parse HEAD)"
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "Release commit: $release_sha"

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: prepare
    if: inputs.publish_github_packages
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish runway-codegen
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          mvn -B -pl runway-codegen deploy -DskipTests
          -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}

  publish-sonatype:
    name: Publish to Sonatype Central
    runs-on: ubuntu-latest
    needs: prepare
    if: inputs.publish_sonatype
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: SONATYPE_TOKEN_USERNAME
          server-password: SONATYPE_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish runway-codegen
        env:
          SONATYPE_TOKEN_USERNAME: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          SONATYPE_TOKEN_PASSWORD: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -pl runway-codegen -Psonatype-release deploy -DskipTests

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-github
      - publish-sonatype
    if: >
      always() &&
      needs.prepare.result == 'success' &&
      (needs.publish-github.result == 'success' || needs.publish-github.result == 'skipped') &&
      (needs.publish-sonatype.result == 'success' || needs.publish-sonatype.result == 'skipped')
    steps:
      - name: Create release tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="runway-codegen-v${{ needs.prepare.outputs.version }}"
          notes="Released artifacts:"$'\n'"- io.github.absketches:runway-codegen:${{ needs.prepare.outputs.version }}"
          notes="${notes}"$'\n\n'"Publish targets:"
          if [[ "${{ inputs.publish_github_packages }}" == "true" ]]; then
            notes="${notes}"$'\n'"- GitHub Packages"
          fi
          if [[ "${{ inputs.publish_sonatype }}" == "true" ]]; then
            notes="${notes}"$'\n'"- Sonatype Central"
          fi

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --target "${{ needs.prepare.outputs.release_sha }}" \
            --title "$tag" \
            --notes "$notes"
